<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — TapasOS</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020A12;
      color: #E8F4F8;
      font-family: 'DM Sans', sans-serif;
      text-align: center;
      gap: 16px;
    }
    .code {
      font-family: 'Syne', sans-serif;
      font-size: 72px;
      font-weight: 800;
      background: linear-gradient(135deg, #00E5FF, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .msg {
      font-size: 16px;
      color: #6B8FA3;
      max-width: 360px;
      line-height: 1.6;
    }
    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #2A3F4F;
      margin-top: 8px;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #00E5FF;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s;
    }
    a:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="msg">This page doesn't exist in TapasOS. The system only recognizes registered modules.</div>
  <div class="hint">segfault at 0x0000 — page not mapped</div>
  <a href="/">Boot TapasOS</a>
</body>
</html>
