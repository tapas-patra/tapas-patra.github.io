<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapasOS — Tapas Kumar Patra</title>
  <meta name="description" content="TapasOS: An AI-first developer portfolio disguised as a fully functional operating system. Instead of reading about me, just ask me anything.">
  <meta name="author" content="Tapas Kumar Patra">

  <!-- Open Graph -->
  <meta property="og:title" content="TapasOS — Tapas Kumar Patra">
  <meta property="og:description" content="An AI-first developer portfolio disguised as a fully functional operating system. Instead of reading about me, just ask me anything.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tapas-patra.github.io">
  <meta property="og:image" content="https://tapas-patra.github.io/images/og-image.jpeg">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TapasOS — Tapas Kumar Patra">
  <meta name="twitter:description" content="An AI-first developer portfolio disguised as a fully functional operating system.">
  <meta name="twitter:image" content="https://tapas-patra.github.io/images/og-image.jpeg">

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

  <!-- Styles -->
  <link rel="stylesheet" href="os/theme.css">
</head>
<body>

  <!-- Boot Screen -->
  <div id="boot-screen">
    <div id="boot-logo">TapasOS</div>
    <div id="boot-post"></div>
    <div id="boot-progress-container">
      <div id="boot-progress-label">Initializing...</div>
      <div id="boot-progress-bar">
        <div id="boot-progress-fill"></div>
      </div>
    </div>
    <button id="boot-skip">Skip &rsaquo;</button>
  </div>

  <!-- Menubar -->
  <div id="menubar">
    <div class="menubar-left">
      <span class="menubar-logo">TapasOS</span>
      <span class="menubar-app-name"></span>
    </div>
    <div class="menubar-right">
      <span class="menubar-admin-badge">ADMIN</span>
      <div class="menubar-github-dot" title="GitHub activity today"></div>
      <span class="menubar-clock"></span>
    </div>
  </div>

  <!-- Desktop -->
  <div id="desktop">
    <canvas id="desktop-canvas"></canvas>
  </div>

  <!-- Dock -->
  <div id="dock"></div>

  <!-- Context Menu -->
  <div id="context-menu"></div>

  <!-- Mobile Redirect -->
  <div id="mobile-banner" style="display:none;position:fixed;inset:0;z-index:20000;background:var(--bg-deep);color:var(--text-primary);font-family:'DM Sans',sans-serif;"></div>

  <!-- Main Script -->
  <script type="module">
    import { runBoot } from './os/boot.js';
    import { initMenubar } from './os/menubar.js';
    import { initDesktop, openDefaults } from './os/desktop.js';
    import { initAdmin } from './os/admin.js';

    // Mobile detection — < 768px shows mobile layout
    if (window.innerWidth < 768) {
      document.getElementById('boot-screen').style.display = 'none';
      document.getElementById('menubar').style.display = 'none';
      document.getElementById('desktop').style.display = 'none';
      document.getElementById('dock').style.display = 'none';
      const banner = document.getElementById('mobile-banner');
      banner.style.display = 'block';
      const { initMobileApp } = await import('./mobile/nav.js');
      initMobileApp(banner);
    } else {
      // Desktop boot sequence
      initMenubar();
      initDesktop();
      initAdmin();
      await runBoot();
      openDefaults();
    }

    // Register Service Worker (with version bust)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js?v=3').catch(() => {});
    }
  </script>
</body>
</html>
