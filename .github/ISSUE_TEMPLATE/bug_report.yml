name: Bug Report
description: Report a bug in TapasOS
labels: ["bug"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      placeholder: Brief description of the bug
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: |
        Steps to reproduce:
        1. Open...
        2. Click...
        3. See error...

        Expected behavior:
        Actual behavior:
    validations:
      required: false
  - type: input
    id: email
    attributes:
      label: Contact Email (optional)
      placeholder: your@email.com
    validations:
      required: false
