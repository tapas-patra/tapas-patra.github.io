name: Keep Supabase Alive

on:
  schedule:
    # Every 5 days at 10:00 UTC
    - cron: '0 10 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/documents?select=id&limit=1" \
            || echo "000")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Supabase ping returned $STATUS — project may be paused"
          else
            echo "Supabase is alive"
          fi
