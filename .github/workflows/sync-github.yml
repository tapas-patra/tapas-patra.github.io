name: Sync GitHub Data

on:
  schedule:
    # Nightly at 02:00 IST (20:30 UTC previous day)
    - cron: '30 20 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-github.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SYNC_TOKEN || github.token }}

      - name: Fetch GitHub data and generate data.json
        uses: actions/github-script@v7
        env:
          GITHUB_USERNAME: tapas-patra
        with:
          github-token: ${{ secrets.GH_SYNC_TOKEN || github.token }}
          script: |
            const username = process.env.GITHUB_USERNAME;

            // ── Fetch repos (try authenticated first for private repos, fall back to public) ──
            let allRepos = [];
            let page = 1;
            try {
              while (true) {
                const { data: repos } = await github.rest.repos.listForAuthenticatedUser({
                  type: 'owner',
                  sort: 'updated',
                  per_page: 100,
                  page,
                });
                if (repos.length === 0) break;
                allRepos = allRepos.concat(repos);
                page++;
              }
              console.log(`Fetched ${allRepos.length} repos via authenticated endpoint`);
            } catch (e) {
              console.log(`Authenticated endpoint failed (${e.status}), falling back to public repos`);
              allRepos = [];
              page = 1;
              while (true) {
                const { data: repos } = await github.rest.repos.listForUser({
                  username,
                  type: 'owner',
                  sort: 'updated',
                  per_page: 100,
                  page,
                });
                if (repos.length === 0) break;
                allRepos = allRepos.concat(repos);
                page++;
              }
              console.log(`Fetched ${allRepos.length} public repos via user endpoint`);
            }

            // Filter out forks
            const ownRepos = allRepos.filter(r => !r.fork);

            // ── Fetch pinned repos via GraphQL ──
            let pinnedRepos = [];
            try {
              const { user } = await github.graphql(`
                query($login: String!) {
                  user(login: $login) {
                    pinnedItems(first: 6, types: REPOSITORY) {
                      nodes {
                        ... on Repository {
                          name
                          description
                          url
                          stargazerCount
                          primaryLanguage { name color }
                          updatedAt
                          repositoryTopics(first: 10) {
                            nodes { topic { name } }
                          }
                        }
                      }
                    }
                  }
                }
              `, { login: username });
              pinnedRepos = user.pinnedItems.nodes.map(r => ({
                name: r.name,
                description: r.description,
                url: r.url,
                stars: r.stargazerCount,
                language: r.primaryLanguage?.name || null,
                language_color: r.primaryLanguage?.color || null,
                updated_at: r.updatedAt,
                topics: r.repositoryTopics.nodes.map(t => t.topic.name),
              }));
            } catch (e) {
              console.log('GraphQL pinned repos failed, skipping:', e.message);
            }

            // ── Contribution graph (52 weeks) via GraphQL ──
            let commitWeeks = [];
            let totalCommitsYear = 0;
            try {
              const { user } = await github.graphql(`
                query($login: String!) {
                  user(login: $login) {
                    contributionsCollection {
                      contributionCalendar {
                        totalContributions
                        weeks {
                          contributionDays {
                            contributionCount
                            date
                          }
                        }
                      }
                    }
                  }
                }
              `, { login: username });

              const calendar = user.contributionsCollection.contributionCalendar;
              totalCommitsYear = calendar.totalContributions;
              commitWeeks = calendar.weeks.map(w => ({
                days: w.contributionDays.map(d => ({
                  count: d.contributionCount,
                  date: d.date,
                })),
              }));
            } catch (e) {
              console.log('GraphQL contributions failed, skipping:', e.message);
            }

            // ── Calculate streak and committed_today ──
            const today = new Date().toISOString().split('T')[0];
            let committedToday = false;
            let streakDays = 0;

            const allDays = commitWeeks.flatMap(w => w.days).reverse();
            for (const day of allDays) {
              if (day.date === today) {
                committedToday = day.count > 0;
              }
              if (day.count > 0) {
                streakDays++;
              } else if (day.date !== today) {
                // Allow today to have 0 (day not over yet)
                break;
              }
            }

            // ── Aggregate language percentages ──
            const langBytes = {};
            for (const repo of ownRepos) {
              try {
                const { data: langs } = await github.rest.repos.listLanguages({
                  owner: username,
                  repo: repo.name,
                });
                for (const [lang, bytes] of Object.entries(langs)) {
                  langBytes[lang] = (langBytes[lang] || 0) + bytes;
                }
              } catch {
                // Skip repos where language fetch fails
              }
            }

            const totalBytes = Object.values(langBytes).reduce((a, b) => a + b, 0);
            const languages = {};
            for (const [lang, bytes] of Object.entries(langBytes)) {
              languages[lang] = {
                bytes,
                percentage: totalBytes > 0 ? Math.round((bytes / totalBytes) * 1000) / 10 : 0,
              };
            }

            // ── Build data.json ──
            // Only expose public repos in the JSON (private repo names stay hidden)
            const publicRepos = ownRepos.filter(r => !r.private);

            const data = {
              profile: {
                name: 'Tapas Kumar Patra',
                title: 'SDET II at Setu by Pine Labs',
                location: 'Bengaluru, India',
                github: `https://github.com/${username}`,
              },
              github: {
                pinned_repos: pinnedRepos,
                all_repos: publicRepos.map(r => ({
                  name: r.name,
                  description: r.description,
                  url: r.html_url,
                  stars: r.stargazers_count,
                  language: r.language,
                  updated_at: r.updated_at,
                  topics: r.topics || [],
                })),
                languages,
                commit_weeks: commitWeeks,
                streak_days: streakDays,
                committed_today: committedToday,
                total_commits_year: totalCommitsYear,
                total_repos: ownRepos.length,
              },
              meta: {
                last_updated: new Date().toISOString(),
                generator: 'TapasOS sync-github.yml',
              },
            };

            // ── Write data.json ──
            const fs = require('fs');
            fs.writeFileSync('data.json', JSON.stringify(data, null, 2));
            console.log(`Generated data.json: ${ownRepos.length} repos, ${Object.keys(languages).length} languages, ${totalCommitsYear} commits this year`);

      - name: Commit data.json
        run: |
          git config user.name "TapasOS Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "chore: auto-sync GitHub data [skip ci]"
            git push
          fi
